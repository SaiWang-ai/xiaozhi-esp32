name: Build Yingjian Future Cabin Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build xingzhi-cube-1.54tft-ml307
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          python scripts/release.py xingzhi-cube-1.54tft-ml307 --name xingzhi-cube-1.54tft-ml307

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: yingjian-future-cabin-firmware
          path: |
            build/*.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
